<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فلج الواشحي - قرية افي</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;500;600;700&family=Cairo:wght@300;400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --green-card: #b7e4c7;
    --orange: #e76f00;
    --orange-light: #f4a261;
    --orange-pale: #fde8d2;
    --orange-card: #ffb347;
    --bg: #f5f0e8;
    --bg2: #ece5d8;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #d4c9b5;
    --white: #fff;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }
  body[lang="bn"] { font-family: 'Noto Sans Bengali', 'Cairo', sans-serif; }
  body[lang="fa"] { font-family: 'Vazirmatn', 'Cairo', sans-serif; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 50%, #40916c 100%);
    color: #fff;
    padding: 28px 24px 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  header h1 {
    font-family: 'Scheherazade New', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }
  body[lang="bn"] header h1 { font-family: 'Noto Sans Bengali', serif; font-size: 2rem; }
  body[lang="fa"] header h1 { font-family: 'Vazirmatn', serif; }
  header p {
    font-size: 0.95rem;
    opacity: 0.9;
    margin-top: 4px;
    position: relative;
  }
  .year-display {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    padding: 5px 18px;
    margin-top: 10px;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    backdrop-filter: blur(4px);
    position: relative;
  }
  .header-badges {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 12px;
    flex-wrap: wrap;
    position: relative;
  }
  .badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.82rem;
    backdrop-filter: blur(4px);
  }

  /* TODAY BANNER */
  .today-banner {
    background: linear-gradient(90deg, var(--green) 0%, var(--green-light) 100%);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 0.95rem;
  }
  .today-banner.is-qad {
    background: linear-gradient(90deg, var(--orange) 0%, var(--orange-light) 100%);
  }
  .today-info { font-weight: 600; font-size: 1.05rem; }
  .today-detail { opacity: 0.9; font-size: 0.88rem; margin-top: 2px; }

  /* LANG BAR */
  .lang-bar {
    background: #1b4332;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
  }
  body[dir="ltr"] .lang-bar { justify-content: flex-end; }
  .lang-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 16px;
    padding: 4px 14px;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active { background: rgba(255,255,255,0.32); font-weight: 700; }
  .lang-btn:hover { background: rgba(255,255,255,0.22); }
  .lang-label { color: rgba(255,255,255,0.6); font-size: 0.78rem; margin-inline-end: 8px; }

  /* DEVICE TOGGLE */
  .device-toggle-bar {
    display: flex;
    justify-content: center;
    padding: 10px 8px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .device-btn {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    color: var(--text-muted);
    transition: all 0.2s;
    font-weight: 600;
  }
  .device-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
  .device-btn:hover:not(.active) { border-color: var(--green); color: var(--green); }

  /* NAV */
  .nav-bar {
    background: var(--white);
    border-bottom: 2px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    flex-wrap: wrap;
  }
  .nav-controls { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: inherit;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }
  .nav-btn:hover { background: var(--green-pale); border-color: var(--green); color: var(--green); }
  .nav-btn.today-btn { background: var(--green); color: #fff; border-color: var(--green); }
  .nav-btn.today-btn:hover { background: var(--green-light); }
  .week-title {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--green);
    min-width: 200px;
    text-align: center;
  }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.2s;
    font-weight: 600;
  }
  .view-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* PROGRESS */
  .cycle-progress {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    margin: 10px 16px 8px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .progress-label { font-size: 0.85rem; color: var(--text-muted); min-width: 140px; font-weight: 600; }
  .progress-track {
    flex: 1;
    height: 12px;
    background: var(--bg2);
    border-radius: 99px;
    overflow: hidden;
    min-width: 120px;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green) 0%, var(--green-light) 100%);
    border-radius: 99px;
    transition: width 0.6s ease;
  }
  .progress-fill.qad { background: linear-gradient(90deg, var(--orange) 0%, var(--orange-light) 100%); }
  .progress-val { font-size: 0.9rem; font-weight: 700; color: var(--green); min-width: 60px; text-align: center; }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    padding: 10px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    font-size: 0.83rem;
    color: var(--text-muted);
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .legend-dot.green { background: var(--green); }
  .legend-dot.orange { background: var(--orange); }

  /* WEEK VIEW */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border: 1.5px solid var(--border);
    margin: 16px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .day-col {
    border-inline-end: 1px solid var(--border);
    background: var(--white);
    min-height: 200px;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: background 0.15s;
  }
  .day-col:last-child { border-inline-end: none; }
  .day-col:hover { background: #f8fbf9; }
  .day-col.is-today { background: #f0faf4; }
  .day-col.is-qad-day { background: #fff8f0; }
  .day-col.is-qad-day:hover { background: #fef2e0; }
  .day-header {
    padding: 10px 8px 8px;
    text-align: center;
    border-bottom: 1.5px solid var(--border);
    background: var(--bg2);
  }
  .day-col.is-today .day-header { background: var(--green-pale); }
  .day-col.is-qad-day .day-header { background: var(--orange-pale); }
  .day-name { font-weight: 700; font-size: 0.92rem; color: var(--text); }
  .day-date { font-size: 0.74rem; color: var(--text-muted); margin-top: 2px; }
  .day-num {
    display: inline-block;
    background: var(--green);
    color: #fff;
    border-radius: 50%;
    width: 26px; height: 26px;
    line-height: 26px;
    font-size: 0.82rem;
    font-weight: 700;
    margin: 5px auto 0;
  }
  .day-col.is-qad-day .day-num { background: var(--orange); }
  .day-col.is-today .day-num { box-shadow: 0 0 0 3px var(--green-light); }
  .bada-list { padding: 6px 4px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .bada-chip {
    background: var(--green-pale);
    border-inline-start: 3px solid var(--green);
    border-radius: 0 5px 5px 0;
    padding: 4px 6px;
    font-size: 0.72rem;
    color: #1b4332;
    line-height: 1.3;
  }
  body[dir="ltr"] .bada-chip { border-radius: 5px 0 0 5px; }
  .bada-chip.qad {
    background: var(--orange-pale);
    border-color: var(--orange);
    color: #7c2d12;
  }
  .bada-name { font-weight: 700; font-size: 0.74rem; }
  .bada-time { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }
  .bada-chip.qad .bada-time { color: #92400e; }

  /* MONTH VIEW */
  .month-view {
    margin: 16px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .month-title {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: #fff;
    padding: 16px 20px;
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .month-header-cell {
    background: var(--bg2);
    padding: 10px 4px;
    text-align: center;
    font-weight: 700;
    font-size: 0.85rem;
    border-bottom: 2px solid var(--border);
    border-inline-end: 1px solid var(--border);
  }
  .month-header-cell:last-child { border-inline-end: none; }
  .month-cell {
    border-inline-end: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 88px;
    padding: 6px 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background: var(--white);
  }
  .month-cell:nth-child(7n) { border-inline-end: none; }
  .month-cell:hover { background: var(--green-pale); }
  .month-cell.other-month { background: #fafaf6; opacity: 0.45; }
  .month-cell.other-month:hover { opacity: 0.7; }
  .month-cell.qad-cell { background: #fff8f0; }
  .month-cell.qad-cell:hover { background: var(--orange-pale); }
  .month-cell.today-cell { background: var(--green-pale); box-shadow: inset 0 0 0 2.5px var(--green); }
  .month-cell.today-cell.qad-cell { background: var(--orange-pale); box-shadow: inset 0 0 0 2.5px var(--orange); }
  .month-cell-date {
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
  }
  .month-cell.today-cell .month-cell-date { color: var(--green); font-size: 1.15rem; }
  .month-cell.today-cell.qad-cell .month-cell-date { color: var(--orange); }
  .month-cell-cycle {
    align-self: flex-end;
    background: var(--green);
    color: #fff;
    border-radius: 99px;
    padding: 1px 9px;
    font-size: 0.72rem;
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }
  .month-cell.qad-cell .month-cell-cycle { background: var(--orange); }
  .month-cell-bada-count {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* DAY VIEW */
  .day-view { margin: 16px; }
  .day-view-header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: #fff;
    border-radius: 12px 12px 0 0;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .day-view-header.is-qad {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
  }
  .day-view-title { font-size: 1.4rem; font-weight: 700; }
  .day-view-sub { font-size: 0.9rem; opacity: 0.92; margin-top: 4px; }
  .day-view-cycle { font-size: 0.95rem; opacity: 0.95; font-weight: 600; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 99px; }
  .bada-table {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .bada-row {
    display: grid;
    grid-template-columns: 1fr 2fr auto;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }
  .bada-row:last-child { border-bottom: none; }
  .bada-row:hover { background: var(--green-pale); }
  .bada-row.qad-row { background: var(--orange-pale); }
  .bada-row.qad-row:hover { background: #ffd9b3; }
  .bada-row-name { font-weight: 700; font-size: 1rem; color: var(--green); }
  .bada-row.qad-row .bada-row-name { color: var(--orange); }
  .bada-row-time { font-size: 0.88rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .time-arrow { color: var(--border); }
  .bada-row-note { font-size: 0.78rem; color: var(--text-muted); background: var(--bg); padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
  .bada-row.qad-row .bada-row-note { background: rgba(231,111,0,0.15); color: #92400e; }
  .no-bada { padding: 32px; text-align: center; color: var(--text-muted); }

  /* DOWNLOAD */
  .download-bar {
    display: flex;
    justify-content: center;
    padding: 16px;
    gap: 10px;
  }
  .download-btn {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: #fff;
    border: none;
    border-radius: 30px;
    padding: 12px 30px;
    font-family: inherit;
    font-size: 0.98rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 16px rgba(45,106,79,0.4);
    transition: all 0.2s;
  }
  .download-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(45,106,79,0.5);
  }

  .footer-note {
    text-align: center;
    padding: 0 20px 24px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* MOBILE LAYOUT */
  body.mobile-view .week-grid { grid-template-columns: 1fr !important; }
  body.mobile-view .day-col { min-height: auto; }
  body.mobile-view .nav-bar { flex-wrap: wrap; gap: 6px; }
  body.mobile-view .nav-controls { flex-wrap: wrap; }
  body.mobile-view .week-title { min-width: unset; width: 100%; font-size: 0.95rem; order: -1; }
  body.mobile-view header h1 { font-size: 1.7rem; }
  body.mobile-view .month-cell { min-height: 60px; padding: 4px; }
  body.mobile-view .month-cell-date { font-size: 0.85rem; }
  body.mobile-view .month-cell-cycle { font-size: 0.65rem; padding: 0px 6px; }
  body.mobile-view .month-header-cell { font-size: 0.7rem; padding: 6px 2px; }
  body.mobile-view .bada-row { grid-template-columns: 1fr; gap: 4px; padding: 12px 14px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .week-grid { grid-template-columns: repeat(2, 1fr); margin: 8px; }
    header h1 { font-size: 1.7rem; }
    .nav-bar { flex-wrap: wrap; }
    .week-title { width: 100%; order: -1; padding: 4px; }
  }
  @media (max-width: 480px) {
    .week-grid { grid-template-columns: 1fr; margin: 6px; }
    .month-cell { min-height: 60px; padding: 4px; }
    .month-cell-date { font-size: 0.85rem; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body lang="ar" dir="rtl">

<!-- LANGUAGE BAR -->
<div class="lang-bar">
  <span class="lang-label" id="langLabel">اللغة / Language / ভাষা:</span>
  <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">العربية</button>
  <button class="lang-btn" data-lang="bn" onclick="setLang('bn')">বাংলা</button>
  <button class="lang-btn" data-lang="fa" onclick="setLang('fa')">فارسی</button>
</div>

<header>
  <h1 id="hdrTitle">🌊 فلج الواشحي</h1>
  <p id="hdrSubtitle">قرية افي • ولاية وادي المعاول • سلطنة عُمان</p>
  <div class="year-display" id="yearDisplay">2026</div>
  <div class="header-badges">
    <span class="badge" id="badge1">📅 دورة 56 يوماً</span>
    <span class="badge" id="badge2">💧 توزيع البادات</span>
    <span class="badge" id="badge3">🕌 التقويم الهجري والميلادي</span>
  </div>
</header>

<div class="today-banner" id="todayBanner">
  <div>
    <div class="today-info" id="todayInfo">…</div>
    <div class="today-detail" id="todayDetail"></div>
  </div>
  <div id="todayBadge" style="font-size:1.1rem;font-weight:700;"></div>
</div>

<!-- DEVICE TOGGLE -->
<div class="device-toggle-bar">
  <button class="device-btn active" id="btnDesktop" onclick="setDevice('desktop')">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    <span id="btnDesktopLabel">كمبيوتر</span>
  </button>
  <button class="device-btn" id="btnMobile" onclick="setDevice('mobile')">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1"/></svg>
    <span id="btnMobileLabel">هاتف</span>
  </button>
</div>

<div class="nav-bar">
  <div class="nav-controls">
    <button class="nav-btn" id="navPrev" onclick="navigatePrev()">→ <span id="navPrevLabel">السابق</span></button>
    <button class="nav-btn today-btn" id="navToday" onclick="goToToday()">اليوم</button>
    <button class="nav-btn" id="navNext" onclick="navigateNext()"><span id="navNextLabel">التالي</span> ←</button>
  </div>
  <div class="week-title" id="periodTitle"></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btnWeek" onclick="setView('week')">أسبوع</button>
    <button class="view-btn" id="btnMonth" onclick="setView('month')">شهر</button>
    <button class="view-btn" id="btnDay" onclick="setView('day')">يوم</button>
  </div>
</div>

// =========================================================================
// HELPERS
// =========================================================================
function getCycleDay(date) {
  // ANCHOR (April 17, 2026) = Day 1. diff=0 → 1, diff=1 → 2, ..., diff=55 → 56, diff=56 → 1, diff=-1 → 56
  const msPerDay = 86400000;
  const d = new Date(date); d.setHours(0,0,0,0);
  const a = new Date(ANCHOR_DATE); a.setHours(0,0,0,0);
  const diff = Math.round((d - a) / msPerDay);
  return ((diff % CYCLE_LENGTH) + CYCLE_LENGTH) % CYCLE_LENGTH + 1;
}
function isQadDay(cycleDay) {
  const d = CYCLE_DATA[cycleDay];
  return d && d.badas.some(b => b.isQad);
}
function isToday(d) {
  const now = new Date();
  return d.getFullYear() === now.getFullYear() &&
         d.getMonth() === now.getMonth() &&
         d.getDate() === now.getDate();
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}
function formatDate(d) {
  const L = LANG_NAMES[currentLang];
  return d.toLocaleDateString(L.locale, { day: 'numeric', month: 'long', year: 'numeric' });
}
function formatDateShort(d) {
  const L = LANG_NAMES[currentLang];
  return d.toLocaleDateString(L.locale, { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatMonthYear(d) {
  const L = LANG_NAMES[currentLang];
  return d.toLocaleDateString(L.locale, { month: 'long', year: 'numeric' });
}
// Saturday is start of week. dow JS: Sun=0..Sat=6
// Days since last Saturday: (dow + 1) % 7
function getWeekStart(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const dow = d.getDay();
  const offset = (dow + 1) % 7;
  d.setDate(d.getDate() - offset);
  return d;
}
function getDayDisplayName(arDayName) {
  const L = LANG_NAMES[currentLang];
  const idx = AR_DAY_TO_INDEX[arDayName];
  return idx !== undefined ? L.days[idx] : arDayName;
}

function renderTodayBanner() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cycleDay = getCycleDay(today);
  const data = CYCLE_DATA[cycleDay];
  const banner = document.getElementById('todayBanner');
  const info = document.getElementById('todayInfo');
  const detail = document.getElementById('todayDetail');
  const badge = document.getElementById('todayBadge');
  const L = LANG_NAMES[currentLang];

  const qad = data && data.badas.some(b => b.isQad);
  banner.className = 'today-banner' + (qad ? ' is-qad' : '');

  const dayNameDisp = data ? getDayDisplayName(data.dayName) : '';
  info.textContent = `${L.today}: ${formatDate(today)} • ${dayNameDisp}`;
  detail.textContent = `${L.cycleDay} ${cycleDay} ${L.fromCycle} ${CYCLE_LENGTH}` +
    (data && data.badas[0] ? ` • ${L.firstBada}: ${data.badas[0].name}` : '');
  badge.textContent = qad ? L.qadLabel : L.badaLabel;
}

function renderProgress() {
  const today = new Date();
  const cycleDay = getCycleDay(today);
  const pct = Math.round((cycleDay / CYCLE_LENGTH) * 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.classList.toggle('qad', isQadDay(cycleDay));
  document.getElementById('progressVal').textContent = `${cycleDay} / ${CYCLE_LENGTH}`;
}

function renderWeek() {
  const L = LANG_NAMES[currentLang];
  const ws = getWeekStart(currentDate);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  document.getElementById('periodTitle').textContent =
    `${formatDateShort(ws)} — ${formatDateShort(we)}`;

  let html = '<div class="week-grid">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i); d.setHours(0,0,0,0);
    const cycleDay = getCycleDay(d);
    const data = CYCLE_DATA[cycleDay];
    const todayCls = isToday(d) ? 'is-today' : '';
    const qadCls = isQadDay(cycleDay) ? 'is-qad-day' : '';
    const dayName = L.days[i]; // i=0 -> Saturday in display order

    html += `<div class="day-col ${todayCls} ${qadCls}" onclick="selectDay(${d.getTime()})">`;
    html += `<div class="day-header">`;
    html += `<div class="day-name">${dayName}</div>`;
    html += `<div class="day-date">${formatDateShort(d)}</div>`;
    html += `<div class="day-num">${cycleDay}</div>`;
    html += `</div>`;
    html += `<div class="bada-list">`;
    if (data && data.badas.length) {
      data.badas.forEach(b => {
        const qCls = b.isQad ? 'qad' : '';
        html += `<div class="bada-chip ${qCls}">`;
        html += `<div class="bada-name">${b.name}</div>`;
        html += `<div class="bada-time">${b.from} ← ${b.to}</div>`;
        html += `</div>`;
      });
    } else {
      html += `<div style="padding:8px;font-size:0.75rem;color:#aaa">—</div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  document.getElementById('weekView').innerHTML = html;
}

function renderMonth() {
  const L = LANG_NAMES[currentLang];
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const monthLabel = formatMonthYear(currentDate);
  document.getElementById('periodTitle').textContent = monthLabel;

  // Grid start = Saturday on/before 1st of month
  const firstOfMonth = new Date(year, month, 1);
  const gridStart = getWeekStart(firstOfMonth);
  const lastOfMonth = new Date(year, month + 1, 0);
  // Grid end = Friday on/after last of month
  const gridEnd = new Date(lastOfMonth);
  const lastDow = lastOfMonth.getDay(); // Sat=6 -> need 6 more, Fri=5 -> 0 more
  // Days to add to reach Friday: target dow=5 (Fri)
  // Sat(6)→6, Sun(0)→5, Mon(1)→4, Tue(2)→3, Wed(3)→2, Thu(4)→1, Fri(5)→0
  const addToFri = (5 - lastDow + 7) % 7;
  gridEnd.setDate(gridEnd.getDate() + addToFri);
  const totalCells = Math.round((gridEnd - gridStart) / 86400000) + 1;

  let html = `<div class="month-view">`;
  html += `<div class="month-title">${monthLabel}</div>`;
  html += `<div class="month-grid">`;

  // Header row
  for (let i = 0; i < 7; i++) {
    html += `<div class="month-header-cell">${L.daysShort[i]}</div>`;
  }
  // Cells
  for (let i = 0; i < totalCells; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    d.setHours(0,0,0,0);
    const cycleDay = getCycleDay(d);
    const data = CYCLE_DATA[cycleDay];
    const inMonth = d.getMonth() === month;
    const qadCls = isQadDay(cycleDay) ? 'qad-cell' : '';
    const todayCls = isToday(d) ? 'today-cell' : '';
    const otherCls = inMonth ? '' : 'other-month';
    const badaCount = data ? data.badas.length : 0;

    html += `<div class="month-cell ${otherCls} ${qadCls} ${todayCls}" onclick="selectDay(${d.getTime()})">`;
    html += `<div class="month-cell-date">${d.getDate()}</div>`;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;gap:4px">`;
    html += `<span class="month-cell-bada-count">${badaCount} ${L.badaCount}</span>`;
    html += `<span class="month-cell-cycle">${cycleDay}</span>`;
    html += `</div>`;
    html += `</div>`;
  }
  html += `</div></div>`;
  document.getElementById('monthView').innerHTML = html;
}

  document.getElementById('periodTitle').textContent = formatDate(d);

  let html = `<div class="day-view">`;
  html += `<div class="day-view-header ${qad ? 'is-qad' : ''}">`;
  html += `<div>`;
  html += `<div class="day-view-title">${data ? getDayDisplayName(data.dayName) : ''} • ${formatDate(d)}</div>`;
  html += `<div class="day-view-sub">${qad ? L.qadLabel : L.badaLabel}</div>`;
  html += `</div>`;
  html += `<div class="day-view-cycle">${L.cycleDay} ${cycleDay} / ${CYCLE_LENGTH}</div>`;
  html += `</div>`;
  html += `<div class="bada-table">`;
  if (data && data.badas.length) {
    data.badas.forEach((b, idx) => {
      html += `<div class="bada-row ${b.isQad ? 'qad-row' : ''}">`;
      html += `<div class="bada-row-name">${idx + 1}. ${b.name}</div>`;
      html += `<div class="bada-row-time">${b.from} <span class="time-arrow">→</span> ${b.to}</div>`;
      if (b.note) html += `<div class="bada-row-note">${b.note}</div>`;
      else html += `<div></div>`;
      html += `</div>`;
    });
  } else {
    html += `<div class="no-bada">${L.noBada}</div>`;
  }
  html += `</div></div>`;
  document.getElementById('dayView').innerHTML = html;
}

function renderUIChrome() {
  const L = LANG_NAMES[currentLang];
  document.body.lang = currentLang;
  document.body.dir = L.dir;
  document.documentElement.lang = currentLang;
  document.documentElement.dir = L.dir;

  document.getElementById('hdrTitle').textContent = L.title;
  document.getElementById('hdrSubtitle').textContent = L.subtitle;
  document.getElementById('badge1').textContent = L.cycleDays;
  document.getElementById('badge2').textContent = L.waterDistribution;
  document.getElementById('badge3').textContent = L.calendars;
  document.getElementById('langLabel').textContent = L.langLabel;
  document.getElementById('btnDesktopLabel').textContent = L.desktop;
  document.getElementById('btnMobileLabel').textContent = L.mobile;
  document.getElementById('navPrevLabel').textContent = L.prev;
  document.getElementById('navNextLabel').textContent = L.next;
  document.getElementById('navToday').textContent = L.todayBtn;
  document.getElementById('btnWeek').textContent = L.week;
  document.getElementById('btnMonth').textContent = L.month;
  document.getElementById('btnDay').textContent = L.day;
  document.getElementById('progressLabel').textContent = L.progress;
  document.getElementById('legendQad').textContent = L.qadLegend;
  document.getElementById('legendBada').textContent = L.badaLegend;
  document.getElementById('downloadLabel').textContent = L.download;
  document.getElementById('footerNote').textContent = L.nameNote;

  // Year display
  document.getElementById('yearDisplay').textContent = new Date().getFullYear();
}

function renderAll() {
  renderUIChrome();
  renderTodayBanner();
  renderProgress();
  if (currentView === 'week') renderWeek();
  else if (currentView === 'month') renderMonth();
  else if (currentView === 'day') renderDayView();
}

// =========================================================================
// ACTIONS
// =========================================================================
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  renderAll();
}
function setDevice(device) {
  currentDevice = device;
  document.getElementById('btnDesktop').classList.toggle('active', device === 'desktop');
  document.getElementById('btnMobile').classList.toggle('active', device === 'mobile');
  document.body.classList.toggle('mobile-view', device === 'mobile');
}
function setView(v) {
  currentView = v;
  document.getElementById('weekView').classList.toggle('hidden', v !== 'week');
  document.getElementById('monthView').classList.toggle('hidden', v !== 'month');
  document.getElementById('dayView').classList.toggle('hidden', v !== 'day');
  document.getElementById('btnWeek').classList.toggle('active', v === 'week');
  document.getElementById('btnMonth').classList.toggle('active', v === 'month');
  document.getElementById('btnDay').classList.toggle('active', v === 'day');
  renderAll();
}
function selectDay(timestamp) {
  selectedDate = new Date(timestamp);
  selectedDate.setHours(0,0,0,0);
  currentDate = new Date(selectedDate);
  setView('day');
}
function navigatePrev() {
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
  else if (currentView === 'day') {
    selectedDate.setDate(selectedDate.getDate() - 1);
    currentDate = new Date(selectedDate);
  }
  else currentDate.setDate(currentDate.getDate() - 7);
  renderAll();
}
function navigateNext() {
  if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
  else if (currentView === 'day') {
    selectedDate.setDate(selectedDate.getDate() + 1);
    currentDate = new Date(selectedDate);
  }
  else currentDate.setDate(currentDate.getDate() + 7);
  renderAll();
}
function goToToday() {
  currentDate = new Date(); currentDate.setHours(0,0,0,0);
  selectedDate = new Date(); selectedDate.setHours(0,0,0,0);
  renderAll();
}
function downloadPage() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'falaj_al_washhi.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// =========================================================================
// INIT
// =========================================================================
renderAll();
</script>
